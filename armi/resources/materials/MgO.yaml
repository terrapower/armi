# Magnesium Oxide

material type: Composite
composition:
  O16: [39.6964103, 39.6964103]
  MG: balance

linear expansion:
  function:
    T:
      min: 0
      max: 1000.0
    type: symbolic
    equation: 1.0489e-5 * T + 6.0458e-9 * T**2 - 2.6875e-12 * T**3
  references:
    - ref: Milo A. Durand, Journal of Applied Physics 7, 297 (1936); doi, 10.1063/1.174539
      type: open literature
