# Inconel800

material type: Metal
composition:
  Ni: [30.0, 35.0]
  Cr: [19.0, 23.0]
  C: [0.00, 0.10]
  Mn: [0.00, 1.50]
  S: [0.00, 0.015]
  Si: [0.0, 1.0]
  Cu: [0.00, 0.75]
  Al: [0.15, 0.60]
  Ti: [0.15, 0.60]
  Fe: balance
  references:
  - ref: https://www.specialmetals.com/documents/technical-bulletins/incoloy/incoloy-alloy-800.pdf
    type: open literature

linear expansion:
