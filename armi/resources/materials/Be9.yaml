# Beryllium
#
# Beryllium is a lightweight metal with lots of interesting nuclear use-cases.
# It has a nice (n,2n) reaction and is an inhalation hazard.

material type: Metal
composition:
  BE9: balance

linear expansion:
  function:
    T:
      min: -223.15
      max: 1286.85
    type: symbolic
    equation: 1e-4 * (8.4305 + 1.1464e-2 * (T+273.15) - 2.9752e-6 * (T+273.15)**2)
