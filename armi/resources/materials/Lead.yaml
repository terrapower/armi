# Natural Lead

material type: Fluid
composition:
  PB: balance

density:
  function:
    T:
      min: 326.85
      max: 1426.85
    type: symbolic
    equation: 11367.0 - 1.1944 * (T + 273.15)

specific heat capacity:
  function:
    T:
      min: 326.85
      max: 1226.85
    type: symbolic
    equation: 162.9 - 3.022e-2 * (T + 273.15) + 8.341e-6 * (T + 273.15)**2
