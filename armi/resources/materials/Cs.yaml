# A liquid Cesium material

material type: Fluid
composition:
  CS133: balance
  references:
  - ref: https://en.wikipedia.org/wiki/Caesium
    type: open literature

density:
  function:
    T:
      min: -273.15
      max: 10000
    type: piecewise
    functions:
      - function:
          T:
            min: -273.15
            max: 28.55
          type: symbolic
          equation: 1930.0
      - function:
          T:
            min: 28.55
            max: 10000
          type: symbolic
          equation: 1843.0
  references:
  - ref: https://en.wikipedia.org/wiki/Caesium
    type: open literature

liquidus temperature:
  function:
    T:
      min: -273.15
      max: 10000
    type: symbolic
    equation: 28.55
  references:
  - ref: https://en.wikipedia.org/wiki/Caesium
    type: open literature
