# An example Concrete material

material type: Composite
composition:
  AL: [3.3872, 3.3872]
  C: [0.1, 0.1]
  CA: [4.4, 4.4]
  FE: [1.4, 1.4]
  H: [1.0, 1.0]
  K: [1.3, 1.3]
  MG: [0.2, 0.2]
  NA23: [1.6, 1.6]
  O16: [52.9107, 52.9107]
  SI: balance
  references:
  - ref: https://web.archive.org/web/20221103120449/https://physics.nist.gov/cgi-bin/Star/compos.pl?matno=144
    type: open literature

density:
  function:
    T:
      min: -273.15
      max: 2000.0
    type: constant
    value: 2300.0
  references:
  - ref: https://web.archive.org/web/20221103120449/https://physics.nist.gov/cgi-bin/Star/compos.pl?matno=144
    type: open literature
