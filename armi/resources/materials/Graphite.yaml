# Graphite

material type: SimpleSolid
composition:
  C: balance

linear expansion:
  function:
    T:
      min: -273.15
      max: 1000.0
    type: symbolic
    equation: -1.454e-2 + 4.812e-4 * T + 1.145e-7 * T**2
  references:
    - ref: McEligot, Donald, Swank, W. David, Cottle, David L., and Valentin, Francisco I. Thermal Properties of G-348 Graphite. United States, N. p., 2016. Web. doi:10.2172/1330693. https://www.osti.gov/biblio/1330693
      type: open literature
