# A very simple Sodium Chloride salt.

material type: SimpleSolid
composition:
  CL35: [45.96, 45.96]
  CL37: [14.70, 14.70]
  NA23: balance

density: 
  function:
    T:
      min: 0
      max: 801
    type: symbolic
    equation: -0.313 * (T+273.15) + 2230.0
  references:
    - ref: From equation 10 of Thermophysical Properties of NaCl. NaBr and NaF by y-ray attenuation technique.
      type: open literature
