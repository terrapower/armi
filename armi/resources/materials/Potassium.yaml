# A liquid Potassium material

material type: Fluid
composition:
  K: balance

density: 
  function:
    T:
      min: 63.2
      max: 1250
    type: symbolic
    equation: 841.5 - 0.2172 * T - 2.7e-5 * T**2 + 4.77e-9 * T**3
  references:
  - ref: Foust, O.J. Sodium-NaK Engineering Handbook Vol. 1. New York, Gordon and Breach, 1972.
    type: open literature
