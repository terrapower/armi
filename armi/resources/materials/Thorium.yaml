# Thorium

material type: Fuel
composition:
  TH232: balance

instantaneous coefficient of thermal expansion:
  function:
    T:
      min: -243.15
      max: 326.85
    type: constant
    value: 11.9e-6
  references:
    - ref: IAEA TECDOC 1450
      type: open literature

thermal conductivity:
  function:
    T:
      min: -273.15
      max: 10000
    type: constant
    value: 43.1
  references:
    - ref: IAEA TECDOC 1450
      type: open literature

melting temperature:
  function:
    T:
      min: -273.15
      max: 10000
    type: constant
    value: 1751.85
  references:
    - ref: IAEA TECDOC 1450
      type: open literature
