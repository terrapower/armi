# Zirconium metal

material type: Metal
composition:
  ZR: balance

thermal conductivity:
  function:
    T:
      min: 24.85
      max: 1726.85
    type: symbolic
    equation: 8.853 + (0.007082 * (T+273.15)) + (0.000002533 * (T+273.15)**2) + (2992.0 / (T+273.15))
  references:
  - ref: AAA Fuels handbook. ANL
    type: open literature

instantaneous coefficient of thermal expansion:
  function:
    T: 0
    type: table
  tabulated data:
    - [19.85, 5.7e-6]
    - [126.85, 5.9e-6]
    - [226.85, 6.6e-6]
    - [326.85, 7.1e-6]
    - [426.85, 7.6e-6]
    - [526.85, 7.9e-6]
    - [626.85, 8.0e-6]
    - [726.85, 8.2e-6]
    - [826.85, 8.2e-6]
    - [863.85, 9.0e-6]
    - [926.85, 9.1e-6]
    - [1126.85, 9.5e-6]
    - [1326.85, 1.03e-5]
    - [1526.85, 1.13e-5]
  references:
  - ref: Y.S. Touloukian, R.K. Kirby, R.E. Taylor and P.D. Desai, Thermal Expansion, Thermophysical Properties of Matter, Vol. 12, IFI/Plenum, New York-Washington (1975). Page 400
    type: open literature

linear expansion:
  function:
    T:
      min: 19.85
      max: 1526.85
    type: piecewise
    functions:
      - function:
          T:
            min: 19.85
            max: 863.85
          type: symbolic
          equation: -0.111 + (2.325e-4 * (T+273.15)) + (5.595e-7 * (T+273.15)**2) - (1.768e-10 * (T+273.15)**3)
      - function:
          T:
            min: 863.85
            max: 1526.85
          type: symbolic
          equation: -0.759 + (1.474e-3 * (T+273.15)) - (5.140e-7 * (T+273.15)**2) + (1.559e-10 * (T+273.15)**3)
  references:
  - ref: Y.S. Touloukian, R.K. Kirby, R.E. Taylor and P.D. Desai, Thermal Expansion, Thermophysical Properties of Matter, Vol. 12, IFI/Plenum, New York-Washington (1975). Page 400
    type: open literature
