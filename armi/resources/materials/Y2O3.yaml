# Yttrium Oxide

material type: Composite
composition:
  O16: [21.25, 21.25]
  Y89: balance

linear expansion:
  function:
    T:
      min: 0
      max: 1300.0
    type: symbolic
    equation: 1.4922e-7 * (T+273.15)**2 + 6.2448e-4 * (T+273.15) - 1.8414e-1
