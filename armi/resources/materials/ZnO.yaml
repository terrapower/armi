# Zinc Oxide

material type: Composite
composition:
  O16: [19.66, 19.66]
  ZN: balance

density:
  function:
    T:
      min: -263.03
      max: 1218.13
    type: symbolic
    equation: 5610.0

linear expansion:
  function:
    T:
      min: -263.03
      max: 1218.13
    type: symbolic
    equation: -1.9183e-10 * (T+273.15)**3 + 6.5944e-7 * (T+273.15)**2 + 5.2992e-5 * (T+273.15) - 5.2631e-2
  references:
  - ref: Figure 1.24 from Zinc Oxide Fundamentals, Materials and Device Technology
    type: open literature
