# LeadBismuth

material type: Fluid
composition:
  BI209: [55.5, 55.5]
  PB: balance
  references:
  - ref: Accessed online at http://www.oecd-nea.org/science/reports/2007/nea6195-handbook.html on 11/9/12
    type: open literature

density:
  function:
    T:
      min: 126.85
      max: 1026.85
    type: symbolic
    equation: 11096.0 - 1.3236 * (T + 273.15)
  references:
  - ref: Accessed online at http://www.oecd-nea.org/science/reports/2007/nea6195-handbook.html on 11/9/12
    type: open literature

dynamic viscosity:
  function:
    T:
      min: 126.85
      max: 826.85
    type: symbolic
    # equation: 4.94e-4 * math.exp(754.1 / (T + 273.15))
    equation: 4.94e-4 * (1 + (754.1 / (T + 273.15)) + ((754.1 / (T + 273.15))**2 / 2) + ((754.1 / (T + 273.15))**3 / 6) + ((754.1 / (T + 273.15))**4 / 24) + ((754.1 / (T + 273.15))**5 / 120) + ((754.1 / (T + 273.15))**6 / 720) + ((754.1 / (T + 273.15))**7 / 5040))
  references:
  - ref: Accessed online at http://www.oecd-nea.org/science/reports/2007/nea6195-handbook.html on 11/9/12
    type: open literature

specific heat capacity:
  function:
    T:
      min: 126.85
      max: 826.85
    type: symbolic
    equation: 159.0 - 2.72e-2 * (T + 273.15) + 7.12e-6 * (T + 273.15)**2
  references:
  - ref: Accessed online at http://www.oecd-nea.org/science/reports/2007/nea6195-handbook.html on 11/9/12
    type: open literature

thermal conductivity:
  function:
    T:
      min: 126.85
      max: 826.85
    type: symbolic
    equation: 2.45 * (T + 273.15) / (86.334 + 0.0511 * (T + 273.15))
  references:
  - ref: Accessed online at http://www.oecd-nea.org/science/reports/2007/nea6195-handbook.html on 11/9/12
    type: open literature
