# ThoriumOxide

material type: Fuel
composition:
  O16: [12.12, 12.12]
  TH232: balance
  references:
  - ref: Thorium fuel cycle -- Potential benefits and challenges, IAEA-TECDOC-1450 (2005). https://www-pub.iaea.org/mtcd/publications/pdf/te_1450_web.pdf
    type: open literature

instantaneous coefficient of thermal expansion:
  function:
    T:
      min: 24.85
      max: 949.85
    type: constant
    value: 9.67e-6
  references:
  - ref: Thorium fuel cycle -- Potential benefits and challenges, IAEA-TECDOC-1450 (2005). https://www-pub.iaea.org/mtcd/publications/pdf/te_1450_web.pdf
    type: open literature

linear expansion:
  function:
    T:
      min: 24.85
      max: 949.85
    type: symbolic
    equation: 9.67e-4 * (T - 24.85)
  references:
  - ref: Thorium fuel cycle -- Potential benefits and challenges, IAEA-TECDOC-1450 (2005). https://www-pub.iaea.org/mtcd/publications/pdf/te_1450_web.pdf
    type: open literature

thermal conductivity:
  function:
    T:
      min: 20
      max: 3369.85
    type: constant
    value: 6.20
  references:
  - ref: Thorium fuel cycle -- Potential benefits and challenges, IAEA-TECDOC-1450 (2005). https://www-pub.iaea.org/mtcd/publications/pdf/te_1450_web.pdf
    type: open literature

melting temperature:
  function:
    T:
      min: -273.15
      max: 1e7
    type: constant
    value: 3369.85
  references:
  - ref: Thorium fuel cycle -- Potential benefits and challenges, IAEA-TECDOC-1450 (2005). https://www-pub.iaea.org/mtcd/publications/pdf/te_1450_web.pdf
    type: open literature
