# Lithium

material type: Fluid
composition:
  LI6: [1.9, 7.8]
  LI7: balance
  references:
  - ref: https://en.wikipedia.org/wiki/Isotopes_of_lithium
    type: open literature

density:
  function:
    T:
      min: 180.54
      max: 1341.85
    type: symbolic
    equation: 512.0
  references:
  - ref: https://en.wikipedia.org/wiki/Lithium
    type: open literature

melting temperature:
  function:
    T:
      min: -273.15
      max: 1e7
    type: symbolic
    equation: 180.54
  references:
  - ref: https://en.wikipedia.org/wiki/Lithium
    type: open literature

boiling temperature:
  function:
    T:
      min: -273.15
      max: 1e7
    type: symbolic
    equation: 1341.85
  references:
  - ref: https://en.wikipedia.org/wiki/Lithium
    type: open literature

thermal conductivity:
  function:
    T:
      min: 180.54
      max: 1341.85
    type: symbolic
    equation: 84.8
  references:
  - ref: https://en.wikipedia.org/wiki/Lithium
    type: open literature

specific heat capacity:
  function:
    T:
      min: 180.54
      max: 1341.85
    type: symbolic
    equation: 3570.0
  references:
  - ref: https://en.wikipedia.org/wiki/Lithium
    type: open literature

