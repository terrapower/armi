# Thorium-Uranium metal

material type: Fuel
composition:
  TH232: [1.0, 1.0]
  U233: balance
  references:
  - ref: Thorium fuel cycle -- Potential benefits and challenges, IAEA-TECDOC-1450 (2005)
    type: open literature

instantaneous coefficient of thermal expansion:
  function:
    T:
      min: -243.15
      max: 326.85
    type: symbolic
    equation: 11.9e-6
  references:
  - ref: Thorium fuel cycle -- Potential benefits and challenges, IAEA-TECDOC-1450 (2005)
    type: open literature

thermal conductivity:
  function:
    T:
      min: -243.15
      max: 326.85
    type: symbolic
    equation: 43.1
  references:
  - ref: Thorium fuel cycle -- Potential benefits and challenges, IAEA-TECDOC-1450 (2005)
    type: open literature

melting temperature:
  function:
    T:
      min: -273.15
      max: 1e7
    type: symbolic
    equation: 2025.0
  references:
  - ref: Thorium fuel cycle -- Potential benefits and challenges, IAEA-TECDOC-1450 (2005)
    type: open literature
